<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="/img/fav.svg">
    <title>В КАЧАЛКЕ</title>
    <link rel="stylesheet" href="/style.css?v=202606101005">
    <link rel="stylesheet" href="/preloader.css?v=202606101005">
    <link rel="stylesheet" href="/reg.css?v=202606101005">
    <link rel="stylesheet" href="/auth.css?v=202606101005">
</head>

<body>
    <div id="preloader" class="preloader">
        <div class="preloader-content">
            <div class="preloader-progress">
                <div class="preloader-progress-bar"></div>
            </div>
            <div class="preloader-text">0%</div>
        </div>
    </div>

    <div class="register-page">
        <div class="register-container">
                        <div class="auth-logo-top">
                <a href="/index.html">
                    <img src="/img/logk.svg" alt="В КАЧАЛКЕ" class="auth-logo-img">
                </a>
                <div class="auth-logo-tag">ВКАЧАЛКЕ</div>
            </div>
            <div class="register-title">Регистрация</div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" id="login" class="form-input" placeholder="только латинские буквы a-z и тире"
                        autocomplete="off">
                    <div id="loginError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Электронная почта</label>
                    <input type="email" id="email" class="form-input" placeholder="example@mail.ru" autocomplete="off">
                    <div id="emailError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="латинские буквы и цифры">
                        <button type="button" class="toggle-password" data-target="password">👁️</button>
                    </div>
                    <div id="passwordError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Повторить пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="повторите пароль">
                        <button type="button" class="toggle-password" data-target="confirmPassword">👁️</button>
                    </div>
                    <div id="confirmError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Ваше имя</label>
                    <input type="text" id="name" class="form-input" placeholder="как вас называть" autocomplete="off"
                        maxlength="15">
                    <div id="nameError" class="error-message"></div>
                </div>

                <button type="submit" id="submitBtn" class="register-btn">Зарегистрироваться</button>
            </form>

            <div class="forgot-password">
                <a href="forgot.html">Вспомнить пароль</a>
            </div>

            <div class="login-link">
                <a href="login.html">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>

    <div id="burgerModal" class="burger-modal">
        <div class="burger-modal-content">
            <div class="burger-modal-header">
                <span class="close-modal">&times;</span>
            </div>
            <div class="burger-nav">
                <button class="nav-btn" id="navProfile">Личный кабинет</button>
            </div>
            <div class="auth-buttons">
                <a href="login.html" class="modal-btn-login" id="menuLoginBtn">Войти</a>
                <a href="reg.html" class="modal-btn-register" id="menuRegisterBtn">Регистрация</a>
                <button class="modal-btn-logout" id="menuLogoutBtn" style="display: none;">Выйти</button>
            </div>
        </div>
    </div>

    <script src="/version.js?v=202606101005"></script>
    <script src="/preloader.js?v=202606101005"></script>
    <script src="/reg.js?v=202606101005"></script>
</body>

</html>
