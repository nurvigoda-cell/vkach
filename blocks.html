<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/img/logk.svg" type="image/svg+xml">
    <title>Блоки — В КАЧАЛКЕ</title>
    <link rel="stylesheet" href="/style.css?v=202606101005">
    <link rel="stylesheet" href="/blocks.css?v=202606101005">
</head>
<body>
<div class="blocks-bg"></div>
<div class="blocks-page">

    <div class="blocks-bg-glow"></div>
    <div class="blocks-bg-grid"></div>

    <header class="blocks-header">
        <div class="blocks-header-inner">
            <div class="burger-menu" id="burgerMenu">
                <span></span><span></span><span></span>
            </div>
            <div class="blocks-header-title">⚡ Блоки</div>
            <div style="width:40px"></div>
        </div>
    </header>

    <main class="blocks-main">

        <div class="blocks-tabs">
            <button class="blocks-tab active" id="tabMy" onclick="switchTab('my')">Мои блоки</button>
            <button class="blocks-tab" id="tabGallery" onclick="switchTab('gallery')">Галерея</button>
        </div>

        <!-- МОИ БЛОКИ -->
        <div class="blocks-section active" id="sectionMy">
            <!-- Поиск -->
            <div class="gallery-search-wrap">
                <div class="gallery-search-row">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:#666;flex-shrink:0">
                        <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <input type="text" id="mySearchInput" class="gallery-search-input"
                        placeholder="Поиск по моим блокам..."
                        oninput="onMySearchInput(this.value)">
                    <button class="gallery-search-clear" id="mySearchClearBtn"
                        onclick="clearMySearch()" style="display:none">✕</button>
                </div>
            </div>
            <!-- Лента категорий -->
            <div class="cat-filter-row" id="myCatFilter"></div>
            <!-- Список блоков -->
            <div id="myBlocksList" class="blocks-my-list"></div>
        </div>

        <!-- ГАЛЕРЕЯ -->
        <div class="blocks-section" id="sectionGallery">

            <!-- Поиск -->
            <div class="gallery-search-wrap">
                <div class="gallery-search-row">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:#666;flex-shrink:0">
                        <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <input type="text" id="gallerySearch" class="gallery-search-input" placeholder="Поиск блоков...">
                    <button class="gallery-search-clear" id="searchClearBtn" onclick="clearSearch()" style="display:none">✕</button>
                </div>
            </div>

            <!-- Лента категорий -->
            <div class="cat-filter-row" id="galleryCatFilter"></div>

            <!-- Результаты поиска / фильтра -->
            <div id="searchResultsSection" style="display:none">
                <div class="gallery-cat-header" style="margin-bottom:14px">
                    <div class="gallery-cat-title">🔍 Результаты</div>
                    <span id="searchResultsLabel" style="font-size:12px;color:var(--muted)"></span>
                </div>
                <div id="searchResultsGrid"></div>
            </div>

            <!-- Категории с блоками -->
            <div id="galleryCats"></div>

        </div>
    </main>
</div>

<!-- МОДАЛЬНОЕ ОКНО БЛОКА -->
<div class="bim-modal" id="blockInfoModal"></div>

<!-- Бургер меню -->
<div id="burgerModal" class="burger-modal">
    <div class="burger-modal-content">
        <div class="burger-modal-header">
            <span class="burger-modal-logo">⚡ В КАЧАЛКЕ</span>
            <button class="close-modal">&times;</button>
        </div>
        <div class="burger-nav">
            <button class="nav-btn" id="navProfile"><span class="nav-btn-icon">👤</span>Личный кабинет</button>
        </div>
        <div class="auth-buttons">
            <div class="auth-label">Аккаунт</div>
            <a href="/login.html" class="modal-btn-login" id="menuLoginBtn">🔑 Войти</a>
            <a href="/reg.html" class="modal-btn-register" id="menuRegisterBtn">✨ Регистрация</a>
            <a href="/admin/index.html" class="modal-btn-login" id="menuAdminLink" style="display:none;background:rgba(233,174,103,0.08);border-color:rgba(233,174,103,0.3);color:#E9AE67">⚙️ Центр управления</a>
            <button class="modal-btn-logout" id="menuLogoutBtn" style="display:none">🚪 Выйти</button>
        </div>
    </div>
</div>

<!-- Нижняя навигация -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <div class="bottom-nav-item" id="navProfileBottom">
        <div class="bottom-nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M5 20v-1c0-3.5 3-6 7-6s7 2.5 7 6v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="bottom-nav-label">Я</div>
    </div>
    <div class="bottom-nav-item" id="navMessagesBottom">
        <div class="bottom-nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 20l1-5C2.5 12.5 2.5 9.5 4 7c1.5-2.5 4.5-4 8-4 4 0 7.5 1.5 9 4s1.5 5.5 0 8c-1.5 2.5-5 4-9 4H3z" stroke="currentColor" stroke-width="1.5"/></svg>
        </div>
        <div class="bottom-nav-label">Сообщения</div>
    </div>
    <div class="bottom-nav-item active">
        <div class="bottom-nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="4" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="4" y="14" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        </div>
        <div class="bottom-nav-label">Блоки</div>
    </div>
  </div>
</div>

<script src="/version.js?v=202606101005"></script>
<script src="/burger.js?v=202606101005"></script>
<script src="/messages.js?v=202606101005"></script>
<script src="/blocks.js?v=202606101005"></script>
</body>
</html>
